<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Al-Wake</title>
<style>
/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #6366f1;
  --secondary: #a855f7;
  --bg: #0b0f1a;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.09);
  --text: #f1f5f9;
  --muted: #64748b;
  --indigo-soft: rgba(99,102,241,0.15);
  --radius: 22px;
}

html, body {
  height: 100%;
  background: #0b0f1a;
  color: var(--text);
  font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  overflow-x: hidden;
}

body {
  background:
    radial-gradient(ellipse 80% 50% at 80% 0%, rgba(99,102,241,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 0% 100%, rgba(168,85,247,0.12) 0%, transparent 60%),
    #0b0f1a;
  min-height: 100vh;
}

/* ─── Layout ─── */
.app { max-width: 900px; margin: 0 auto; padding: 24px 16px 100px; }

/* ─── Header ─── */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; gap: 12px; flex-wrap: wrap; }

.brand h1 {
  font-size: 2.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, #818cf8, #a78bfa, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
}
.brand p { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

.clock-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 24px;
  text-align: center;
}
#current-time { font-size: 2rem; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -1px; }
.clock-label { font-size: 0.65rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }

/* ─── Stats Row ─── */
.stats { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; margin-bottom: 24px; }

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color .3s;
}
.stat-card:nth-child(2) { border-left: 3px solid var(--primary); }
.stat-icon {
  width: 42px; height: 42px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  background: rgba(99,102,241,0.1);
  color: #818cf8;
  flex-shrink: 0;
}
.stat-val { font-size: 1.3rem; font-weight: 800; }
.stat-sub { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

.add-btn {
  background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(168,85,247,0.2));
  border: 1px solid rgba(99,102,241,0.35);
  border-radius: var(--radius);
  padding: 16px 28px;
  color: var(--text);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all .25s;
  white-space: nowrap;
}
.add-btn:active { transform: scale(0.97); opacity: 0.85; }

/* ─── Alarm Grid ─── */
#alarm-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.alarm-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 200px;
  transition: all .3s;
  position: relative;
  overflow: hidden;
}
.alarm-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  opacity: 0;
  transition: opacity .3s;
}
.alarm-card.active-card::before { opacity: 1; }
.alarm-card.disabled { opacity: 0.35; filter: grayscale(1); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.alarm-label { font-size: 0.7rem; color: #818cf8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.alarm-time-text { font-size: 2.8rem; font-weight: 900; letter-spacing: -2px; cursor: pointer; transition: color .2s; }
.alarm-time-text:active { color: #818cf8; }
.day-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.day-chip { font-size: 0.6rem; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.2); color: #a5b4fc; padding: 2px 6px; border-radius: 6px; }
.day-chip.daily { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: var(--muted); }

.card-bottom {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.card-meta { font-size: 0.65rem; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
.card-meta span { display: flex; align-items: center; gap: 6px; }
.card-actions { display: flex; align-items: center; gap: 10px; }
.del-btn { background: none; border: none; color: #475569; cursor: pointer; padding: 6px; border-radius: 8px; font-size: 1rem; transition: color .2s; }
.del-btn:active { color: #ef4444; }

/* ─── Toggle Switch ─── */
.switch { position: relative; display: inline-block; width: 50px; height: 26px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.1);
  border-radius: 34px;
  transition: .4s;
}
.slider::before {
  position: absolute; content: "";
  height: 18px; width: 18px;
  left: 4px; bottom: 4px;
  background: white; border-radius: 50%;
  transition: .4s;
}
input:checked + .slider { background: linear-gradient(45deg, var(--primary), var(--secondary)); }
input:checked + .slider::before { transform: translateX(24px); }

/* ─── Modal ─── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: #121624;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 28px;
  width: 100%;
  max-width: 460px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 28px 24px;
  scrollbar-width: none;
}
.modal::-webkit-scrollbar { display: none; }

.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.modal-title { font-size: 1.4rem; font-weight: 800; }
.close-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.05); border: none; color: var(--muted); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background .2s; }
.close-btn:active { background: rgba(255,255,255,0.1); }

.field { margin-bottom: 20px; }
.field label { display: block; font-size: 0.75rem; font-weight: 700; color: #818cf8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

.input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 14px 16px;
  color: var(--text);
  font-size: 1rem;
  outline: none;
  transition: border-color .2s;
  font-family: inherit;
}
.input:focus { border-color: var(--primary); }

.time-picker-wrap {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}
input[type="time"].input {
  font-size: 2.8rem;
  font-weight: 900;
  letter-spacing: -2px;
  text-align: center;
  background: transparent;
  border: none;
  padding: 0;
  color-scheme: dark;
  cursor: pointer;
}

/* ─── Days ─── */
.days-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.day-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  color: var(--muted);
  font-size: 0.7rem;
  cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; justify-content: center;
}
.day-btn.on {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
  box-shadow: 0 4px 14px rgba(99,102,241,0.4);
}

/* ─── File Button ─── */
.file-btn {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color .2s;
  color: var(--text);
}
.file-btn:active { border-color: var(--primary); }
.file-name { font-size: 0.85rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 280px; }
.file-name.chosen { color: #a5b4fc; }

/* ─── Sub Panels ─── */
.sub-panel {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px;
  padding: 16px 18px;
  margin-bottom: 16px;
}
.sub-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.sub-panel-title { font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.sub-panel-title .icon { font-size: 1rem; }

.num-input {
  width: 100%; text-align: center;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 10px;
  color: var(--text);
  font-size: 1.1rem;
  font-weight: 700;
  outline: none;
  transition: border-color .2s;
  font-family: inherit;
}
.num-input:focus { border-color: var(--primary); }
.num-inputs-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.num-inputs-row .sub-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.auto-close-body { display: none; }
.auto-close-body.visible { display: block; }

/* ─── Buttons ─── */
.btn-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 8px; }
.btn-save {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border: none; border-radius: 16px;
  padding: 16px; color: white;
  font-size: 1rem; font-weight: 800;
  cursor: pointer; transition: opacity .2s;
  font-family: inherit;
}
.btn-save:active { opacity: 0.85; }
.btn-cancel {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 16px;
  color: var(--muted); font-size: 1rem;
  cursor: pointer; transition: background .2s;
  font-family: inherit;
}
.btn-cancel:active { background: rgba(255,255,255,0.1); }

/* ─── Ringing Screen ─── */
#ringing-screen {
  position: fixed; inset: 0; z-index: 100;
  background: #0b0f1a;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px;
}
#ringing-screen.active { display: flex; }

.ring-glow {
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 40%, rgba(99,102,241,0.25), transparent 65%);
  pointer-events: none;
}
.ring-icon-wrap {
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.2);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 32px;
  animation: pulse 2s ease-in-out infinite;
  position: relative;
}
.ring-icon { font-size: 5rem; animation: bellShake 1s ease-in-out infinite; }

@keyframes pulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99,102,241,0.4); }
  50% { transform: scale(1.06); box-shadow: 0 0 0 20px rgba(99,102,241,0); }
}
@keyframes bellShake {
  0%,100% { transform: rotate(-8deg); }
  50% { transform: rotate(8deg); }
}

.ring-name { font-size: 1rem; color: #818cf8; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
.ring-title { font-size: 2.2rem; font-weight: 900; margin-bottom: 12px; }
.ring-time { font-size: 3rem; font-weight: 900; letter-spacing: -2px; font-variant-numeric: tabular-nums; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 10px 28px; margin-bottom: 16px; }
.auto-close-label { font-size: 0.8rem; color: #818cf8; font-weight: 700; margin-bottom: 28px; display: none; }
.auto-close-label.visible { display: block; }

.ring-btns { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 340px; position: relative; z-index: 1; }
.btn-stop {
  background: white; color: #0b0f1a;
  border: none; border-radius: 60px;
  padding: 18px; font-size: 1.2rem; font-weight: 900;
  cursor: pointer; transition: transform .15s;
  font-family: inherit;
}
.btn-stop:active { transform: scale(0.96); }
.btn-snooze {
  background: var(--primary); color: white;
  border: none; border-radius: 60px;
  padding: 18px; font-size: 1.2rem; font-weight: 900;
  cursor: pointer; transition: transform .15s;
  font-family: inherit;
}
.btn-snooze:active { transform: scale(0.96); }

/* ─── Empty State ─── */
.empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.3; }
.empty p { font-size: 1rem; }

@media (max-width: 500px) {
  .stats { grid-template-columns: 1fr 1fr; }
  .add-btn { grid-column: 1/-1; justify-content: center; }
  .brand h1 { font-size: 1.8rem; }
}
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="brand">
      <h1>Al-Wake</h1>
      <p id="current-date">جار التحميل...</p>
    </div>
    <div class="clock-card">
      <div id="current-time">00:00:00</div>
      <div class="clock-label">الوقت الحالي</div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-icon">⏰</div>
      <div>
        <div class="stat-val" id="active-count">0</div>
        <div class="stat-sub">منبهات مفعّلة</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⚡</div>
      <div>
        <div class="stat-val" id="next-alarm-countdown" style="font-size:0.95rem;color:#818cf8;">لا يوجد</div>
        <div class="stat-sub" id="next-alarm-time">المنبه القادم</div>
      </div>
    </div>
    <button class="add-btn" onclick="openModal()">
      <span style="font-size:1.3rem">＋</span> إضافة منبه
    </button>
  </div>

  <!-- Alarm List -->
  <div id="alarm-list"></div>

</div>

<!-- ═══ Modal ═══ -->
<div class="modal-overlay" id="alarm-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">منبه جديد</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>

    <div class="field">
      <label>اسم المنبه</label>
      <input class="input" type="text" id="alarm-name" placeholder="مثلاً: صلاة الفجر">
    </div>

    <div class="time-picker-wrap">
      <input class="input" type="time" id="alarm-time" value="08:00">
    </div>

    <div class="field">
      <label>أيام التكرار</label>
      <div class="days-wrap" id="days-container">
        <button class="day-btn" onclick="toggleDay(this,0)">أحد</button>
        <button class="day-btn" onclick="toggleDay(this,1)">اثنين</button>
        <button class="day-btn" onclick="toggleDay(this,2)">ثلاثاء</button>
        <button class="day-btn" onclick="toggleDay(this,3)">أربعاء</button>
        <button class="day-btn" onclick="toggleDay(this,4)">خميس</button>
        <button class="day-btn" onclick="toggleDay(this,5)">جمعة</button>
        <button class="day-btn" onclick="toggleDay(this,6)">سبت</button>
      </div>
    </div>

    <div class="field">
      <label>نغمة التنبيه</label>
      <div class="file-btn" onclick="document.getElementById('audio-input').click()">
        <span class="file-name" id="file-name-display">استخدام نغمة من الجهاز...</span>
        <span>🎵</span>
      </div>
      <input type="file" id="audio-input" accept="audio/*" class="input" style="display:none" onchange="handleFileSelect(event)">
    </div>

    <div class="sub-panel">
      <div class="sub-panel-title"><span class="icon">🔄</span> وقت الغفوة (دقائق)</div>
      <input class="num-input" type="number" id="snooze-min" value="5" min="1" max="60">
    </div>

    <div class="sub-panel">
      <div class="sub-panel-header">
        <div class="sub-panel-title"><span class="icon">⏱</span> إيقاف تلقائي</div>
        <label class="switch">
          <input type="checkbox" id="auto-close-toggle" onchange="toggleAutoClose()">
          <span class="slider"></span>
        </label>
      </div>
      <div class="auto-close-body" id="auto-close-body">
        <div class="num-inputs-row">
          <div>
            <div class="sub-label">الدقائق</div>
            <input class="num-input" type="number" id="close-min" value="0" min="0" max="59">
          </div>
          <div>
            <div class="sub-label">الثواني</div>
            <input class="num-input" type="number" id="close-sec" value="30" min="0" max="59">
          </div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-save" onclick="saveAlarm()">💾 حفظ المنبه</button>
      <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<!-- ═══ Ringing Screen ═══ -->
<div id="ringing-screen">
  <div class="ring-glow"></div>
  <div class="ring-icon-wrap">
    <span class="ring-icon">🔔</span>
  </div>
  <div class="ring-name" id="ringing-label">المنبه</div>
  <div class="ring-title">وقت الاستيقاظ!</div>
  <div class="ring-time" id="ringing-time-display">00:00</div>
  <div class="auto-close-label" id="auto-close-status">
    يُغلق تلقائياً خلال: <span id="countdown-timer">00:00</span>
  </div>
  <div class="ring-btns">
    <button class="btn-stop" onclick="stopAlarm()">⏹ إيقاف المنبه</button>
    <button class="btn-snooze" onclick="snoozeAlarm()">💤 غفوة</button>
  </div>
</div>

<script>
// ═══ State ═══
let alarms = [];
let editingId = null;
let selectedDays = [];
let customAudioData = null;
let audioPlayer = new Audio();
let autoCloseTimeout = null;
let countdownInterval = null;
let currentActiveAlarm = null;

// ═══ Init ═══
window.onload = () => {
  try {
    const saved = localStorage.getItem('alwake_v1');
    if (saved) alarms = JSON.parse(saved);
  } catch(e) {}
  renderAlarms();
  tick();
  setInterval(tick, 1000);
};

function tick() {
  const now = new Date();
  document.getElementById('current-time').textContent =
    now.toLocaleTimeString('ar-EG', { hour12: false });
  document.getElementById('current-date').textContent =
    now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  if (now.getSeconds() === 0) checkAlarms(now);
  updateNextAlarm(now);
}

// ═══ Alarm Check ═══
function checkAlarms(now) {
  const hm = pad(now.getHours()) + ':' + pad(now.getMinutes());
  const day = now.getDay();
  alarms.forEach(a => {
    if (a.enabled && a.time === hm) {
      if (a.days.length === 0 || a.days.includes(day)) triggerAlarm(a);
    }
  });
}

function updateNextAlarm(now) {
  const active = alarms.filter(a => a.enabled);
  if (!active.length) {
    document.getElementById('next-alarm-countdown').textContent = 'لا يوجد منبه';
    document.getElementById('next-alarm-time').textContent = '---';
    return;
  }
  let minDiff = Infinity, nearest = null;
  active.forEach(a => {
    const [h, m] = a.time.split(':').map(Number);
    const days = a.days.length ? a.days : [0,1,2,3,4,5,6];
    days.forEach(d => {
      let dt = new Date(now);
      dt.setHours(h, m, 0, 0);
      let diff = (d - now.getDay() + 7) % 7;
      dt.setDate(dt.getDate() + diff);
      if (dt <= now) dt.setDate(dt.getDate() + (a.days.length ? 7 : 1));
      const ms = dt - now;
      if (ms < minDiff) { minDiff = ms; nearest = dt; }
    });
  });
  if (nearest) {
    const h = Math.floor(minDiff / 3600000);
    const min = Math.floor((minDiff % 3600000) / 60000);
    document.getElementById('next-alarm-countdown').textContent =
      (h > 0 ? h + ' س ' : '') + min + ' د';
    document.getElementById('next-alarm-time').textContent =
      nearest.toLocaleDateString('ar-EG', {weekday:'short'}) + ' ' +
      pad(nearest.getHours()) + ':' + pad(nearest.getMinutes());
  }
}

// ═══ Render ═══
function renderAlarms() {
  const list = document.getElementById('alarm-list');
  list.innerHTML = '';
  const dayNames = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
  let active = 0;

  if (!alarms.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">⏰</div><p>لا توجد منبهات بعد<br>اضغط "إضافة منبه" للبدء</p></div>`;
    document.getElementById('active-count').textContent = '0';
    return;
  }

  [...alarms].sort((a,b) => a.time.localeCompare(b.time)).forEach(alarm => {
    if (alarm.enabled) active++;
    const daysHtml = alarm.days.length
      ? alarm.days.map(d => `<span class="day-chip">${dayNames[d]}</span>`).join('')
      : `<span class="day-chip daily">يومياً</span>`;

    const card = document.createElement('div');
    card.className = `alarm-card ${alarm.enabled ? 'active-card' : 'disabled'}`;
    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="alarm-label">${alarm.label || 'منبه'}</div>
          <div class="alarm-time-text" onclick="editAlarm('${alarm.id}')">${alarm.time}</div>
          <div class="day-chips">${daysHtml}</div>
        </div>
        <label class="switch">
          <input type="checkbox" ${alarm.enabled ? 'checked' : ''} onchange="toggleAlarm('${alarm.id}')">
          <span class="slider"></span>
        </label>
      </div>
      <div class="card-bottom">
        <div class="card-meta">
          <span>${alarm.audioName ? '🎵 ' + alarm.audioName.substring(0,18) : '🔔 افتراضية'}</span>
          <span>💤 غفوة ${alarm.snoozeMin || 5} د</span>
        </div>
        <div class="card-actions">
          <button class="del-btn" onclick="deleteAlarm('${alarm.id}')">🗑</button>
        </div>
      </div>`;
    list.appendChild(card);
  });
  document.getElementById('active-count').textContent = active;
}

// ═══ Modal ═══
function resetAudio() {
  customAudioData = null;
  document.getElementById('audio-input').value = '';
  const d = document.getElementById('file-name-display');
  d.textContent = 'استخدام نغمة من الجهاز...';
  d.classList.remove('chosen');
}

function openModal() {
  editingId = null; selectedDays = [];
  resetAudio();
  document.getElementById('modal-title').textContent = 'منبه جديد';
  document.getElementById('alarm-name').value = '';
  document.getElementById('alarm-time').value = '08:00';
  document.getElementById('snooze-min').value = '5';
  document.getElementById('auto-close-toggle').checked = false;
  document.getElementById('close-min').value = '0';
  document.getElementById('close-sec').value = '30';
  document.getElementById('auto-close-body').classList.remove('visible');
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('alarm-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('alarm-modal').classList.remove('open');
}

function toggleDay(btn, day) {
  btn.classList.toggle('on');
  selectedDays.includes(day)
    ? (selectedDays = selectedDays.filter(d => d !== day))
    : selectedDays.push(day);
}

function toggleAutoClose() {
  const on = document.getElementById('auto-close-toggle').checked;
  document.getElementById('auto-close-body').classList.toggle('visible', on);
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    customAudioData = ev.target.result;
    const d = document.getElementById('file-name-display');
    d.textContent = file.name;
    d.classList.add('chosen');
  };
  reader.readAsDataURL(file);
}

function saveAlarm() {
  const autoOn = document.getElementById('auto-close-toggle').checked;
  const alarm = {
    id: editingId || Date.now().toString(),
    label: document.getElementById('alarm-name').value || 'منبه',
    time: document.getElementById('alarm-time').value || '08:00',
    days: [...selectedDays],
    enabled: true,
    audioData: customAudioData,
    audioName: customAudioData ? document.getElementById('file-name-display').textContent : null,
    snoozeMin: parseInt(document.getElementById('snooze-min').value) || 5,
    autoCloseSeconds: autoOn
      ? (parseInt(document.getElementById('close-min').value)||0)*60 +
        (parseInt(document.getElementById('close-sec').value)||0)
      : null
  };

  if (editingId) {
    const old = alarms.find(a => a.id === editingId);
    if (!alarm.audioData && old) { alarm.audioData = old.audioData; alarm.audioName = old.audioName; }
    alarms = alarms.map(a => a.id === editingId ? alarm : a);
  } else {
    alarms.push(alarm);
  }
  save(); renderAlarms(); closeModal();
}

function editAlarm(id) {
  const a = alarms.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  resetAudio();
  document.getElementById('modal-title').textContent = 'تعديل المنبه';
  document.getElementById('alarm-name').value = a.label || '';
  document.getElementById('alarm-time').value = a.time;
  document.getElementById('snooze-min').value = a.snoozeMin || 5;
  document.getElementById('auto-close-toggle').checked = !!a.autoCloseSeconds;
  document.getElementById('auto-close-body').classList.toggle('visible', !!a.autoCloseSeconds);
  if (a.autoCloseSeconds) {
    document.getElementById('close-min').value = Math.floor(a.autoCloseSeconds/60);
    document.getElementById('close-sec').value = a.autoCloseSeconds%60;
  }
  if (a.audioName) {
    const d = document.getElementById('file-name-display');
    d.textContent = a.audioName; d.classList.add('chosen');
  }
  selectedDays = [...a.days];
  document.querySelectorAll('.day-btn').forEach(b => {
    b.classList.toggle('on', selectedDays.includes(parseInt(b.getAttribute('onclick').match(/\d+/)[0])));
  });
  document.getElementById('alarm-modal').classList.add('open');
}

function toggleAlarm(id) {
  alarms = alarms.map(a => a.id === id ? {...a, enabled: !a.enabled} : a);
  save(); renderAlarms();
}

function deleteAlarm(id) {
  alarms = alarms.filter(a => a.id !== id);
  save(); renderAlarms();
}

// ═══ Trigger / Stop ═══
function triggerAlarm(alarm) {
  stopAlarm();
  currentActiveAlarm = alarm;
  document.getElementById('ringing-label').textContent = alarm.label || 'المنبه';
  document.getElementById('ringing-time-display').textContent = alarm.time;

  const screen = document.getElementById('ringing-screen');
  screen.classList.add('active');

  audioPlayer.src = alarm.audioData || '';
  if (!alarm.audioData) {
    // نغمة مدمجة بدون إنترنت — نغمة بيب تلقائية
    playBeep();
  } else {
    audioPlayer.loop = true;
    audioPlayer.volume = 1;
    audioPlayer.play().catch(() => playBeep());
  }

  if (alarm.autoCloseSeconds > 0) {
    const statusEl = document.getElementById('auto-close-status');
    const timerEl = document.getElementById('countdown-timer');
    statusEl.classList.add('visible');
    let rem = alarm.autoCloseSeconds;
    const update = () => { timerEl.textContent = pad(Math.floor(rem/60)) + ':' + pad(rem%60); };
    update();
    countdownInterval = setInterval(() => { rem--; update(); if (rem <= 0) stopAlarm(); }, 1000);
  } else {
    document.getElementById('auto-close-status').classList.remove('visible');
  }
}

let beepInterval = null;
function playBeep() {
  stopBeep();
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const beep = () => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    o.type = 'square';
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.4);
  };
  beep();
  beepInterval = setInterval(beep, 700);
  window._beepCtx = ctx;
}

function stopBeep() {
  if (beepInterval) { clearInterval(beepInterval); beepInterval = null; }
  if (window._beepCtx) { try { window._beepCtx.close(); } catch(e){} window._beepCtx = null; }
}

function snoozeAlarm() {
  if (!currentActiveAlarm) return;
  const now = new Date();
  now.setMinutes(now.getMinutes() + (currentActiveAlarm.snoozeMin || 5));
  alarms.push({
    ...currentActiveAlarm,
    id: 'snooze-' + Date.now(),
    label: '💤 ' + currentActiveAlarm.label,
    time: pad(now.getHours()) + ':' + pad(now.getMinutes()),
    days: [], enabled: true
  });
  stopAlarm(); save(); renderAlarms();
}

function stopAlarm() {
  audioPlayer.pause();
  audioPlayer.currentTime = 0;
  stopBeep();
  clearTimeout(autoCloseTimeout);
  clearInterval(countdownInterval);
  document.getElementById('ringing-screen').classList.remove('active');
  document.getElementById('auto-close-status').classList.remove('visible');
  currentActiveAlarm = null;
}

// ═══ Helpers ═══
function pad(n) { return String(n).padStart(2,'0'); }
function save() { localStorage.setItem('alwake_v1', JSON.stringify(alarms)); }
</script>
